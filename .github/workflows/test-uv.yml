name: test-uv

on:
  push:
    branches:
      - "master"
      - "main"
    tags:
      - "v*"
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      git-ref:
        description: "Git ref (optional)"
        required: false

jobs:
  test:
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux system deps (Xvfb/X11)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0
        shell: bash

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install project with uv sync
        run: |
          # Use the lockfile to install all deps deterministically — no resolver runs,
          # no pip conflicts.  The 'dev' extra brings in pytest.
          uv sync --frozen --extra dev
          # psygnal binary wheels can break ImSwitch's SignalInterface subclassing;
          # reinstall from source to get pure-Python modules.
          uv pip install psygnal --no-binary :all:
        shell: bash

      - name: Verify installation
        run: |
          echo "=== UV venv packages ==="
          uv pip list
          echo "=== Python package verification ==="
          uv run python -c "import imswitch; print(f'ImSwitch version: {imswitch.__version__}')"
          echo "=== Testing critical imports ==="
          uv run python -c "from imswitch.imcontrol.model import Options; print('Options import successful')" || echo "Options import failed"
        shell: bash

      - name: Wait for frontend to build
        id: wait-build-frontend
        uses: lucasssvaz/wait-on-workflow@v1
        with:
          workflow: build-frontend.yaml
          sha: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download built frontend
        uses: actions/download-artifact@v5
        with:
          name: frontend
          path: ./frontend/build
          github-token: ${{github.token}}
          run-id: ${{ steps.wait-build-frontend.outputs.run-id }}

      - name: Run Unit Tests
        run: |
          # -p no:arkitekt_next disables the arkitekt pytest plugin (requires a live arkitekt server)
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run --server-args "-screen 0 1920x1080x24" uv run python -m pytest \
              imswitch/imcontrol/_test/unit \
              -p no:arkitekt_next \
              -v --tb=short
          else
            uv run python -m pytest \
              imswitch/imcontrol/_test/unit \
              -p no:arkitekt_next \
              -v --tb=short
          fi
        shell: bash
